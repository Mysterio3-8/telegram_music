# keybest.cc — Mini App (статика) + API (uvicorn :8010) + webhook ЮKassa.
# HTTPS-блок добавляет certbot: certbot --nginx -d keybest.cc
server {
    listen 80;
    listen [::]:80;
    server_name keybest.cc www.keybest.cc;

    root /opt/tg-music-bot/miniapp;
    index index.html;

    # Статика Mini App: SPA без роутера — всё на index.html
    location / {
        try_files $uri /index.html;
    }

    # REST API для Mini App (префикс /api срезается)
    location /api/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 60m;
    }

    # Уведомления ЮKassa
    location /webhook/ {
        proxy_pass http://127.0.0.1:8010/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
